name: CI/CD - Paquetería DevOps

# Pipeline DevOps: Plan -> Code -> Build -> Test -> Release -> Deploy
# Implementa Continuous Integration y Continuous Delivery para microservicios.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ECR_REGISTRY }}

jobs:

  # ---------------------------------------------------------------------------
  # 1. Lint y pruebas unitarias por microservicio (matriz)
  # ---------------------------------------------------------------------------
  test:
    name: Lint y pruebas (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - shipment-service
          - tracking-service
          - routing-service
          - notification-service
          - billing-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: contains(matrix.service, 'auth') || contains(matrix.service, 'shipment') || contains(matrix.service, 'notification')
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/${{ matrix.service }}/package-lock.json

      - name: Setup Python
        if: contains(matrix.service, 'tracking') || contains(matrix.service, 'routing') || contains(matrix.service, 'billing')
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias (Node)
        if: contains(matrix.service, 'auth') || contains(matrix.service, 'shipment') || contains(matrix.service, 'notification')
        working-directory: services/${{ matrix.service }}
        run: npm ci || npm install

      - name: Instalar dependencias (Python)
        if: contains(matrix.service, 'tracking') || contains(matrix.service, 'routing') || contains(matrix.service, 'billing')
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Ejecutar pruebas (Node)
        if: contains(matrix.service, 'auth') || contains(matrix.service, 'shipment') || contains(matrix.service, 'notification')
        working-directory: services/${{ matrix.service }}
        run: npm test --if-present

      - name: Ejecutar pruebas (Python)
        if: contains(matrix.service, 'tracking') || contains(matrix.service, 'routing') || contains(matrix.service, 'billing')
        working-directory: services/${{ matrix.service }}
        run: pytest -q || true

  # ---------------------------------------------------------------------------
  # 2. Build de imágenes Docker y escaneo de vulnerabilidades
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker (${{ matrix.service }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - shipment-service
          - tracking-service
          - routing-service
          - notification-service
          - billing-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir imagen
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: false
          tags: paqueteria/${{ matrix.service }}:${{ github.sha }}
          load: true

      - name: Escanear con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: paqueteria/${{ matrix.service }}:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          format: 'table'

  # ---------------------------------------------------------------------------
  # 3. Publicación a Amazon ECR (sólo en main)
  # ---------------------------------------------------------------------------
  publish:
    name: Publicar a ECR
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - shipment-service
          - tracking-service
          - routing-service
          - notification-service
          - billing-service
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:latest
            ${{ env.ECR_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}

  # ---------------------------------------------------------------------------
  # 4. Despliegue a ECS (Fargate)
  # ---------------------------------------------------------------------------
  deploy:
    name: Desplegar a ECS Fargate
    needs: publish
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Forzar nuevo deployment
        run: |
          aws ecs update-service \
            --cluster paqueteria-cluster \
            --service paqueteria-svc \
            --force-new-deployment
